name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  verify:
    name: Typecheck · Tests · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Valeurs factices : les routes lisent l'env à l'exécution (rendu
          # dynamique), pas au build. Elles évitent juste un éventuel accès
          # à une variable manquante pendant la compilation.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
