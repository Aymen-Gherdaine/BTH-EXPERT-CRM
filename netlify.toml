[[plugins]]
  package = "@netlify/plugin-nextjs"

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Les en-têtes de sécurité sont désormais définis dans next.config.ts (headers()),
# appliqués par le runtime Next — plus fiable que les header-rules netlify.toml.
